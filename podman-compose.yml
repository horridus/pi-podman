volumes:
  mariadb-data:

networks:
  llm-network:
    external: true

services:
  pi:
    build:
      context: .
      dockerfile: Containerfile
    container_name: pi
    environment:
      MARIADB_HOST: mariadb
      MARIADB_PORT: 3306
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      # Monta SOLO la cartella specificata in .env
      - ${PIPODMAN_WORKSPACE_PATH}:/workspace:Z
      # Persiste la configurazione di pi tra le sessioni
      - ${PI_CONFIG_PATH:-~/.pi}:/root/.pi:Z
      # Persiste le estensioni personalizzate tra le sessioni
      - ${PI_CUSTOM_EXTENSIONS_PATH:-~/.pi/custom_extensions}:/root/.pi/custom_extensions:Z
    depends_on:
      - mariadb
    working_dir: /workspace
    stdin_open: true
    tty: true
    # Accesso a internet abilitato tramite rete bridge (default podman-compose)
    # Il container condivide il DNS dell'host e ha accesso alla rete esterna
    dns:
      - 8.8.8.8
      - 8.8.4.4
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp
      - /root/.npm
  mariadb:
    image: mariadb:11
    container_name: pi-mariadb
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    volumes:
      - mariadb-data:/var/lib/mysql:Z
    restart: unless-stopped
    expose:
      - "3306"
